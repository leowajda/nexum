id: project-pipeline
title: Eureka Pipeline
direction: LR
mermaid:
  nodeSpacing: 96
  rankSpacing: 132
  diagramPadding: 28
  wrappingWidth: 220
  curve: basis
  fontSize: 21
render:
  noteWidth: 272
  noteGap: 80
  legendColumns: 3
selectors:
  - projects: [eureka]
  - roles: [programs, site-input, site-bundle, generated-site, rendered-site]
annotations:
  - id: pipeline-source
    target:
      projects: [eureka]
      roles: [source-repo]
    text: Source repo merged by upstream automation
    placement: top
    tone: source_repos
  - id: pipeline-adapter
    target:
      projects: [eureka]
      roles: [project-adapter]
    text: |-
      Effect schemas decode YAML
      and project build emits site artifacts
    placement: bottom
    tone: tools
