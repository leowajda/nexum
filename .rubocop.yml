plugins:
  - rubocop-minitest
  - rubocop-performance
  - rubocop-rake

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.2
  SuggestExtensions: false
  Exclude:
    - "_site/**/*"
    - "node_modules/**/*"
    - "sources/**/*"
    - "vendor/**/*"

Layout/LineLength:
  Max: 120
  Exclude:
    - "test/**/*"

Metrics/AbcSize:
  Max: 40
  Exclude:
    - "test/**/*"

Metrics/BlockLength:
  Max: 40
  Exclude:
    - "test/**/*"

Metrics/ClassLength:
  Max: 150

Metrics/CyclomaticComplexity:
  Max: 10
  Exclude:
    - "test/**/*"

Metrics/MethodLength:
  Max: 32
  Exclude:
    - "test/**/*"

Metrics/ParameterLists:
  Max: 12

Metrics/PerceivedComplexity:
  Max: 10
  Exclude:
    - "test/**/*"

Minitest/MultipleAssertions:
  Max: 30

Style/Documentation:
  Enabled: false

Style/ModuleFunction:
  Enabled: false

Style/MultilineBlockChain:
  Enabled: false
