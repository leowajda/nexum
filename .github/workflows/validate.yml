name: Validate Site

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Setup Coursier
        uses: coursier/setup-action@v3

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify graph extractor toolchain
        run: |
          java -version
          jdeps --version
          sbt --version
          cs --help >/dev/null

      - name: Typecheck
        run: pnpm typecheck

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build site
        run: pnpm run build:site:refresh-graphs
