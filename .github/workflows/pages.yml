name: Deploy GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Write Pages config override
        run: |
          cat > "$RUNNER_TEMP/pages-config.yml" <<EOF
          url: ${{ steps.pages.outputs.origin }}
          baseurl: ${{ steps.pages.outputs.base_path }}
          EOF

      - name: Syntax-check source validation
        run: pnpm check:validate

      - name: Lint Ruby
        run: pnpm lint:ruby

      - name: Check JavaScript syntax
        run: pnpm check:js

      - name: Validate source catalogs
        run: pnpm validate:catalogs

      - name: Run Ruby tests
        run: pnpm test:ruby

      - name: Build Jekyll site
        run: bundle exec jekyll build --source site-src --destination _site --config site-src/_config.yml,"$RUNNER_TEMP/pages-config.yml"

      - name: Build search records
        run: pnpm build:search-records

      - name: Build Pagefind index
        run: pnpm build:pagefind

      - name: Check Pagefind index
        run: pnpm check:pagefind

      - name: Check SEO metadata
        run: pnpm check:seo

      - name: Check internal links
        run: pnpm check:links

      - name: Run functional browser checks
        run: pnpm test:functional:built

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
