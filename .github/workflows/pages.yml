name: Deploy GitHub Pages

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.6.5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Setup Coursier
        uses: coursier/setup-action@v1

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify graph extractor toolchain
        run: |
          java -version
          jdeps --version
          sbt --version
          cs --help >/dev/null

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Generate site source
        run: pnpm generate:refresh-graphs

      - name: Write Pages config override
        run: |
          cat > "$RUNNER_TEMP/pages-config.yml" <<EOF
          url: ${{ steps.pages.outputs.origin }}
          baseurl: ${{ steps.pages.outputs.base_path }}
          EOF

      - name: Build Jekyll site
        run: bundle exec jekyll build --source site --destination _site --config site/_config.yml,"$RUNNER_TEMP/pages-config.yml"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
