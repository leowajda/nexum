{%- assign problem = site.data.generated[page.project_key].problem_pages[page.problem_slug] -%}

{%- else -%}
  <article class="problem-embed problem-embed--centered">
    {%- include problem_viewer.html problem=problem embed=true -%}
  </article>
{%- endif -%}
