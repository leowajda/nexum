title: Leonardo Wajda
author: Leonardo Wajda
email: dev.leowajda@tuta.io
url: https://leowajda.github.io
baseurl: ""
description: "A focused personal website for algorithm solutions, source notes, and technical writing."

markdown: kramdown
highlighter: rouge

sass:
  sass_dir: _sass
  style: compressed

collections_dir: collections

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

collections:
  projects:
    output: false
  eureka_indexes:
    output: false
  eureka_languages:
    output: true
    permalink: /:path/
  eureka_problems:
    output: true
    permalink: /:path/
  eureka_implementations:
    output: true
    permalink: /:path/
  source_languages:
    output: true
    permalink: /:path/
  source_modules:
    output: true
    permalink: /:path/
  source_documents:
    output: true
    permalink: /:path/

theme_config:
  appearance: "auto"
  date_format: "%Y-%m-%d"
  show_description: true
  lowercase_titles: false

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: projects
    values:
      seo:
        type: WebPage
  - scope:
      path: ""
      type: eureka_indexes
    values:
      seo:
        type: WebPage
  - scope:
      path: ""
      type: eureka_languages
    values:
      layout: problems
      shell: wide
      custom_js:
        - eureka-filters
      seo:
        type: WebPage
  - scope:
      path: ""
      type: eureka_problems
    values:
      layout: problem
      shell: wide
      seo:
        type: WebPage
  - scope:
      path: ""
      type: eureka_implementations
    values:
      layout: problem_embed
      shell: wide
      seo:
        type: WebPage
  - scope:
      path: ""
      type: source_languages
    values:
      layout: source_language
      shell: wide
      seo:
        type: WebPage
  - scope:
      path: ""
      type: source_modules
    values:
      layout: source_module
      shell: source
      seo:
        type: WebPage
  - scope:
      path: ""
      type: source_documents
    values:
      layout: source_document
      shell: source
      seo:
        type: WebPage
