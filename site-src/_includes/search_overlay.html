<dialog class="search-overlay" aria-labelledby="site-search-title" data-search-overlay>
  <div class="search-overlay__inner">
    <div class="search-overlay__bar">
      <label class="search-overlay__label" for="site-search-input" id="site-search-title">Search</label>
      <input
        id="site-search-input"
        class="search-overlay__input"
        type="search"
        placeholder="Search"
        autocomplete="off"
        data-search-input
      >
      <button class="icon-action icon-action--compact" type="button" aria-label="Close search" title="Close search" data-search-close>
        {%- include icon.html name="close" class="icon-action__icon" -%}
      </button>
    </div>
    <p class="search-overlay__summary" data-search-summary aria-live="polite">Type to search.</p>
    <div class="search-overlay__results" data-search-results role="list"></div>
    <button class="control-button search-overlay__more" type="button" data-search-more hidden>Show more</button>
  </div>
</dialog>
