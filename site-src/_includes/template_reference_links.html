{%- assign references = include.references | default: empty -%}
{%- if references.size > 0 -%}
  <nav
    class="template-reference-links{% if include.class %} {{ include.class }}{% endif %}"
    aria-label="{{ include.label | default: 'Templates' }}"
    {% if include.attributes %}{{ include.attributes }}{% endif %}
  >
    <ul class="tag-list">
      {%- for reference in references -%}
        {%- assign href = reference.url | default: '' -%}
        {%- if href != '' -%}
          <li>
            <a class="tag tag--link" href="{{ href | relative_url }}">
              {{ reference.label }}
            </a>
          </li>
        {%- endif -%}
      {%- endfor -%}
    </ul>
  </nav>
{%- endif -%}
