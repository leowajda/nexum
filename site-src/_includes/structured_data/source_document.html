{%- assign source_schema = page.source_schema -%}
{%- assign breadcrumbs = source_schema.breadcrumbs -%}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "TechArticle",
  "headline": {{ page.title | jsonify }},
  "description": {{ include.page_description | jsonify }},
  "url": {{ include.page_url | jsonify }},
  "mainEntityOfPage": {{ include.page_url | jsonify }},
  "author": {{ include.person_json | strip }},
  "publisher": {{ include.person_json | strip }},
  "about": {{ source_schema.about | jsonify }}
  {%- if breadcrumbs and breadcrumbs.size > 0 -%}
  ,
  "breadcrumb": {
    "@type": "BreadcrumbList",
    "itemListElement": [
      {%- for crumb in breadcrumbs -%}
        {
          "@type": "ListItem",
          "position": {{ forloop.index }},
          "name": {{ crumb.name | jsonify }},
          "item": {{ crumb.item | absolute_url | jsonify }}
        }{% unless forloop.last %},{% endunless %}
      {%- endfor -%}
    ]
  }
  {%- endif -%}
}
</script>
