    def topologicalOrder(graph: List[List[Int]]): List[Int] =
      val indegree = Array.fill(graph.length)(0)

      for
        neighbors <- graph
        neighbor <- neighbors
      do indegree(neighbor) += 1

      val queue = scala.collection.mutable.Queue.from(
        graph.indices.filter(node => indegree(node) == 0)
      )
      val order = scala.collection.mutable.ListBuffer.empty[Int]

      while queue.nonEmpty do
        val node = queue.dequeue()
        order += node

        for neighbor <- graph(node) do
          indegree(neighbor) -= 1
          if indegree(neighbor) == 0 then queue.enqueue(neighbor)

      if order.length == graph.length then order.toList else List.empty
