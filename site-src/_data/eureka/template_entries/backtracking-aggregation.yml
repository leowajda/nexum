  code: |
    int countCombinations(int[] nums, int target) {
        return countCombinations(0, target, nums);
    }

    int countCombinations(int index, int remaining, int[] nums) {
        if (remaining == 0) {
            return 1;
        }

        int combinations = 0;

        for (int i = index; i < nums.length; i++) {
            if (nums[i] > remaining) {
                continue;
            }

            combinations += countCombinations(i, remaining - nums[i], nums);
        }

        return combinations;
    }
- entry_id: backtracking-aggregation-scala
  language: scala
  code: |
    def countCombinations(nums: Array[Int], target: Int): Int =
      def countFrom(index: Int, remaining: Int): Int =
        if remaining == 0 then
          1
        else
          (index until nums.length).foldLeft(0) { (count, i) =>
            if nums(i) > remaining then count
            else count + countFrom(i, remaining - nums(i))
          }

      countFrom(0, target)
