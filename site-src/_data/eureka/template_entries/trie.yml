  code: |
    final class Trie:
      private final class Node:
        val children = scala.collection.mutable.Map.empty[Char, Node]
        var terminal = false

      private val root = Node()

      def insert(word: String): Unit =
        var node = root
        for ch <- word do
          node = node.children.getOrElseUpdate(ch, Node())
        node.terminal = true

      def search(word: String): Boolean =
        walk(word).exists(_.terminal)

      def startsWith(prefix: String): Boolean =
        walk(prefix).nonEmpty

      private def walk(text: String): Option[Node] =
        text.foldLeft(Option(root))((node, ch) => node.flatMap(_.children.get(ch)))
- entry_id: trie-python
