    class Trie {
        struct Node {
            std::array<Node*, 26> child{};
            bool end = false;
        };

        Node root;

        Node* walk(const std::string& text) {
            Node* node = &root;
            for (char ch : text) {
                node = node->child[ch - 'a'];
                if (node == nullptr)
                    return nullptr;
            }
            return node;
        }

    public:
        void insert(const std::string& word) {
            Node* node = &root;
            for (char ch : word) {
                Node*& next = node->child[ch - 'a'];
                if (next == nullptr)
                    next = new Node();
                node = next;
            }
            node->end = true;
        }

        bool search(const std::string& word) {
            Node* node = walk(word);
            return node != nullptr && node->end;
        }

        bool startsWith(const std::string& prefix) {
            return walk(prefix) != nullptr;
        }
    };

