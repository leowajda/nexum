    class Trie:
        def __init__(self):
            self.root = {}

        def insert(self, word):
            node = self.root
            for ch in word:
                node = node.setdefault(ch, {})
            node["$"] = True

        def search(self, word):
            node = self.walk(word)
            return node is not None and "$" in node

        def starts_with(self, prefix):
            return self.walk(prefix) is not None

        def walk(self, text):
            node = self.root
            for ch in text:
                if ch not in node:
                    return None
                node = node[ch]
            return node
