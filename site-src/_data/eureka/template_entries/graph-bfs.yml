    std::vector<int> shortestPaths(const std::vector<std::vector<int>>& graph, int start) {
        std::vector<int> distance(graph.size(), -1);
        std::queue<int> queue;

        queue.push(start);
        distance[start] = 0;

        while (!queue.empty()) {
            int node = queue.front();
            queue.pop();

            for (int neighbor : graph[node]) {
                if (distance[neighbor] != -1)
                    continue;

                distance[neighbor] = distance[node] + 1;
                queue.push(neighbor);
            }
        }

        return distance;
    }

