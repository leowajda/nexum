    def shortest_paths(graph, start):
        distance = [-1] * len(graph)
        distance[start] = 0
        queue = [start]
        head = 0

        while head < len(queue):
            node = queue[head]
            head += 1

            for neighbor in graph[node]:
                if distance[neighbor] != -1:
                    continue

                distance[neighbor] = distance[node] + 1
                queue.append(neighbor)

        return distance
