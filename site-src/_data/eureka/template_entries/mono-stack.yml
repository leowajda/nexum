    def nextGreaterIndices(nums: Array[Int]): Array[Int] =
      val nextGreater = Array.fill(nums.length)(-1)
      val stack = scala.collection.mutable.ArrayDeque.empty[Int]

      for index <- nums.indices do
        while stack.nonEmpty && nums(stack.last) < nums(index) do
          nextGreater(stack.removeLast()) = index

        stack.append(index)

      nextGreater
- entry_id: mono-stack-python
