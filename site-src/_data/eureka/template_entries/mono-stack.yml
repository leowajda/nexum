    def next_greater_indices(nums: list[int]) -> list[int]:
        next_greater = [-1] * len(nums)
        stack: list[int] = []

        for index, value in enumerate(nums):
            while stack and nums[stack[-1]] < value:
                next_greater[stack.pop()] = index
            stack.append(index)

        return next_greater
