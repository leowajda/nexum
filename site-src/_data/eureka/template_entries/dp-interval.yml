    def burst_balloons(nums):
        values = [1] + nums + [1]
        n = len(nums)
        dp = [[0] * (n + 2) for _ in range(n + 2)]
        for length in range(1, n + 1):
            for left in range(1, n - length + 2):
                right = left + length - 1
                for last in range(left, right + 1):
                    gain = values[left - 1] * values[last] * values[right + 1]
                    dp[left][right] = max(dp[left][right], dp[left][last - 1] + gain + dp[last + 1][right])
        return dp[1][n]

