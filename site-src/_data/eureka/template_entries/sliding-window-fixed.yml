- entry_id: sliding-window-fixed-java
  language: java
  code: |
    int maxWindowSum(int[] nums, int k) {
        int windowSum = 0;

        for (int i = 0; i < k; i++) {
            windowSum += nums[i];
        }

        int best = windowSum;

        for (int right = k; right < nums.length; right++) {
            windowSum += nums[right] - nums[right - k];
            best = Math.max(best, windowSum);
        }

        return best;
    }
