    def levelOrder(root: TreeNode): List[List[Int]] =
      if root == null then
        List.empty
      else
        val levels = scala.collection.mutable.ListBuffer.empty[List[Int]]
        val queue = scala.collection.mutable.Queue(root)

        while queue.nonEmpty do
          val levelSize = queue.size
          val level = scala.collection.mutable.ListBuffer.empty[Int]

          for _ <- 0 until levelSize do
            val node = queue.dequeue()
            level += node.val
            if node.left != null then queue.enqueue(node.left)
            if node.right != null then queue.enqueue(node.right)

          levels += level.toList

        levels.toList
