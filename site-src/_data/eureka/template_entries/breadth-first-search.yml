    def level_order(root):
        if not root:
            return []

        levels = []
        queue = [root]
        head = 0

        while head < len(queue):
            level = []
            level_end = len(queue)

            while head < level_end:
                node = queue[head]
                head += 1
                level.append(node.val)
                if node.left:
                    queue.append(node.left)
                if node.right:
                    queue.append(node.right)

            levels.append(level)

        return levels
