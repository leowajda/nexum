    void floodFill(int[][] grid, int row, int col, int color, int old) {
        if (row < 0 || row == grid.length || col < 0 || col == grid[0].length)
            return;
        if (grid[row][col] != old)
            return;

        grid[row][col] = color;
        floodFill(grid, row + 1, col, color, old);
        floodFill(grid, row - 1, col, color, old);
        floodFill(grid, row, col + 1, color, old);
        floodFill(grid, row, col - 1, color, old);
    }
