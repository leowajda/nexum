    def flood_fill(grid, row, col, color, old):
        if row < 0 or row == len(grid) or col < 0 or col == len(grid[0]):
            return
        if grid[row][col] != old:
            return

        grid[row][col] = color
        flood_fill(grid, row + 1, col, color, old)
        flood_fill(grid, row - 1, col, color, old)
        flood_fill(grid, row, col + 1, color, old)
        flood_fill(grid, row, col - 1, color, old)

