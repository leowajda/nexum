- entry_id: two-pointers-same-java
  language: java
  code: |
    int removeDuplicates(int[] nums) {
        if (nums.length == 0)
            return 0;

        int write = 1;

        for (int read = 1; read < nums.length; read++) {
            if (nums[read] == nums[write - 1])
                continue;

            nums[write] = nums[read];
            write++;
        }

        return write;
    }
