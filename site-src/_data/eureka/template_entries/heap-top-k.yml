- entry_id: heap-top-k-java
  language: java
  code: |
    List<Integer> topK(int[] nums, int k) {
        PriorityQueue<Integer> heap = new PriorityQueue<>();

        for (int value : nums) {
            heap.offer(value);
            if (heap.size() > k)
                heap.poll();
        }

        return new ArrayList<>(heap);
    }
