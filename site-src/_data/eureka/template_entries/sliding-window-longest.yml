    def longest_unique_substring(s: str) -> int:
        counts: dict[str, int] = {}
        left = 0
        best = 0

        for right, current in enumerate(s):
            counts[current] = counts.get(current, 0) + 1

            while counts[current] > 1:
                outgoing = s[left]
                counts[outgoing] -= 1
                left += 1

            best = max(best, right - left + 1)

        return best
