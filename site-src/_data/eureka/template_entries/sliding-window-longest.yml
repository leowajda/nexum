  language: cpp
  code: |
    int longestUniqueSubstring(const std::string& s) {
        std::array<int, 128> counts{};
        int left = 0;
        int best = 0;

        for (int right = 0; right < static_cast<int>(s.size()); right++) {
            counts[s[right]]++;

            while (counts[s[right]] > 1) {
                counts[s[left]]--;
                left++;
            }

            best = std::max(best, right - left + 1);
        }

        return best;
    }

