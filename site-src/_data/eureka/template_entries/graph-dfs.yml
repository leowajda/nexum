- entry_id: graph-dfs-java
  language: java
  code: |
    int componentSize(int node, List<List<Integer>> graph, boolean[] seen) {
        seen[node] = true;

        int size = 1;
        for (int neighbor : graph.get(node)) {
            if (seen[neighbor])
                continue;

            size += componentSize(neighbor, graph, seen);
        }

        return size;
    }
- entry_id: graph-dfs-scala
  language: scala
  code: |
    def componentSize(node: Int, graph: List[List[Int]], seen: Array[Boolean]): Int =
      seen(node) = true

      graph(node).foldLeft(1) { (size, neighbor) =>
        if seen(neighbor) then size
        else size + componentSize(neighbor, graph, seen)
      }
- entry_id: graph-dfs-python
  language: python
  code: |
    def component_size(node: int, graph: list[list[int]], seen: list[bool]) -> int:
        seen[node] = True
        size = 1

        for neighbor in graph[node]:
            if seen[neighbor]:
                continue
            size += component_size(neighbor, graph, seen)

        return size
