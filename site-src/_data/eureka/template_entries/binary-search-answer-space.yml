    def min_capacity(weights, days):
        left, right = max(weights), sum(weights)
        while left < right:
            mid = (left + right) // 2
            if can_ship(weights, days, mid):
                right = mid
            else:
                left = mid + 1
        return left

    def can_ship(weights, days, capacity):
        used_days = 1
        load = 0
        for weight in weights:
            if load + weight > capacity:
                used_days += 1
                load = 0
            load += weight
        return used_days <= days

