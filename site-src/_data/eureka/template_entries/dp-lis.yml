    def length_of_lis(nums):
        tails = []
        for value in nums:
            left, right = 0, len(tails)
            while left < right:
                mid = (left + right) // 2
                if tails[mid] < value:
                    left = mid + 1
                else:
                    right = mid
            if left == len(tails):
                tails.append(value)
            else:
                tails[left] = value
        return len(tails)

