    int lengthOfLIS(int[] nums) {
        int[] tails = new int[nums.length];
        int size = 0;
        for (int value : nums) {
            int i = Arrays.binarySearch(tails, 0, size, value);
            if (i < 0)
                i = -i - 1;
            tails[i] = value;
            if (i == size)
                size++;
        }
        return size;
    }
- entry_id: dp-lis-python
