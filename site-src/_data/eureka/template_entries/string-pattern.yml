- entry_id: string-pattern-java
  language: java
  code: |
    int[] prefixTable(String pattern) {
        int[] prefix = new int[pattern.length()];
        int matched = 0;

        for (int index = 1; index < pattern.length(); index++) {
            while (matched > 0 && pattern.charAt(index) != pattern.charAt(matched)) {
                matched = prefix[matched - 1];
            }

            if (pattern.charAt(index) == pattern.charAt(matched)) {
                matched++;
            }
            prefix[index] = matched;
        }

        return prefix;
    }
- entry_id: string-pattern-python
  language: python
  code: |
    def prefix_table(pattern: str) -> list[int]:
        prefix = [0] * len(pattern)
        matched = 0

        for index in range(1, len(pattern)):
            while matched > 0 and pattern[index] != pattern[matched]:
                matched = prefix[matched - 1]

            if pattern[index] == pattern[matched]:
                matched += 1
            prefix[index] = matched

        return prefix

