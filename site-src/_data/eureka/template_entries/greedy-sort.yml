- entry_id: greedy-sort-java
  language: java
  code: |
    int maxNonOverlapping(int[][] intervals) {
        Arrays.sort(intervals, (a, b) -> Integer.compare(a[1], b[1]));
        int count = 0;
        int end = Integer.MIN_VALUE;
        for (int[] interval : intervals) {
            if (interval[0] < end)
                continue;
            count++;
            end = interval[1];
        }
        return count;
    }

