- entry_id: backtracking-java
  language: java
  code: |
    List<List<Integer>> subsets(int[] nums) {
        List<List<Integer>> subsets = new ArrayList<>();
        collectSubsets(0, nums, new ArrayList<>(), subsets);
        return subsets;
    }

    void collectSubsets(int index, int[] nums, List<Integer> path, List<List<Integer>> subsets) {
        subsets.add(new ArrayList<>(path));

        for (int i = index; i < nums.length; i++) {
            path.add(nums[i]);
            collectSubsets(i + 1, nums, path, subsets);
            path.remove(path.size() - 1);
        }
    }
- entry_id: backtracking-scala
  language: scala
  code: |
    def subsets(nums: Array[Int]): List[List[Int]] =
      val subsets = scala.collection.mutable.ListBuffer.empty[List[Int]]
      val path = scala.collection.mutable.ArrayBuffer.empty[Int]

      def collect(index: Int): Unit =
        subsets += path.toList

        for i <- index until nums.length do
          path += nums(i)
          collect(i + 1)
          path.remove(path.length - 1)

      collect(0)
      subsets.toList
- entry_id: backtracking-python
  language: python
  code: |
    def subsets(nums: list[int]) -> list[list[int]]:
        subsets: list[list[int]] = []
        path: list[int] = []

        def collect(index: int) -> None:
            subsets.append(path.copy())

            for i in range(index, len(nums)):
                path.append(nums[i])
                collect(i + 1)
                path.pop()

        collect(0)
        return subsets
- entry_id: backtracking-cpp
  language: cpp
  code: |
    void collectSubsets(
        int index,
        const std::vector<int>& nums,
        std::vector<int>& path,
        std::vector<std::vector<int>>& subsets
    ) {
        subsets.push_back(path);

        for (int i = index; i < static_cast<int>(nums.size()); i++) {
            path.push_back(nums[i]);
            collectSubsets(i + 1, nums, path, subsets);
            path.pop_back();
        }
    }

    std::vector<std::vector<int>> subsets(const std::vector<int>& nums) {
        std::vector<std::vector<int>> subsets;
        std::vector<int> path;

        collectSubsets(0, nums, path, subsets);
        return subsets;
    }

