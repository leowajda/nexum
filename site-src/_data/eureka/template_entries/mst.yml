    class UnionFind {
        std::vector<int> parent;
        std::vector<int> size;

    public:
        UnionFind(int n) : parent(n), size(n, 1) {
            for (int i = 0; i < n; i++)
                parent[i] = i;
        }

        int find(int x) {
            if (parent[x] != x)
                parent[x] = find(parent[x]);
            return parent[x];
        }

        bool unite(int a, int b) {
            int ra = find(a);
            int rb = find(b);
            if (ra == rb)
                return false;
            if (size[ra] < size[rb])
                std::swap(ra, rb);
            parent[rb] = ra;
            size[ra] += size[rb];
            return true;
        }
    };

    int minimumSpanningTreeCost(int n, std::vector<std::array<int, 3>>& edges) {
        std::sort(edges.begin(), edges.end(), [](auto& a, auto& b) {
            return a[2] < b[2];
        });

        UnionFind uf(n);
        int cost = 0;
        int used = 0;

        for (auto [a, b, weight] : edges) {
            if (!uf.unite(a, b))
                continue;
            cost += weight;
            used++;
        }

        return used == n - 1 ? cost : -1;
    }

