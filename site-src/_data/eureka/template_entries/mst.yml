    def minimumSpanningTreeCost(n: Int, edges: Array[Array[Int]]): Int =
      val uf = UnionFind(n)
      var cost = 0
      var used = 0

      for edge <- edges.sortBy(_(2)) do
        if uf.unite(edge(0), edge(1)) then
          cost += edge(2)
          used += 1

      if used == n - 1 then cost else -1

    final class UnionFind(n: Int):
      private val parent = Array.tabulate(n)(identity)
      private val size = Array.fill(n)(1)

      def find(x: Int): Int =
        if parent(x) != x then parent(x) = find(parent(x))
        parent(x)

      def unite(a: Int, b: Int): Boolean =
        var ra = find(a)
        var rb = find(b)
        if ra == rb then return false
        if size(ra) < size(rb) then
          val tmp = ra
          ra = rb
          rb = tmp
        parent(rb) = ra
        size(ra) += size(rb)
        true
