    def minimum_spanning_tree_cost(n, edges):
        parent = list(range(n))
        size = [1] * n

        def find(x):
            if parent[x] != x:
                parent[x] = find(parent[x])
            return parent[x]

        def unite(a, b):
            ra, rb = find(a), find(b)
            if ra == rb:
                return False
            if size[ra] < size[rb]:
                ra, rb = rb, ra
            parent[rb] = ra
            size[ra] += size[rb]
            return True

        cost = used = 0
        for a, b, weight in sorted(edges, key=lambda edge: edge[2]):
            if unite(a, b):
                cost += weight
                used += 1

        return cost if used == n - 1 else -1
