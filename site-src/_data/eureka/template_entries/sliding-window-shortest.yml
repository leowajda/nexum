    def minWindowLength(target: Int, nums: Array[Int]): Int =
      var left = 0
      var sum = 0
      var best = Int.MaxValue

      for right <- nums.indices do
        sum += nums(right)

        while sum >= target do
          best = math.min(best, right - left + 1)
          sum -= nums(left)
          left += 1

      if best == Int.MaxValue then 0 else best
- entry_id: sliding-window-shortest-python
  language: python
  code: |
    def min_window_length(target: int, nums: list[int]) -> int:
        left = 0
        total = 0
        best = len(nums) + 1

        for right, value in enumerate(nums):
            total += value

            while total >= target:
                best = min(best, right - left + 1)
                total -= nums[left]
                left += 1

        return 0 if best == len(nums) + 1 else best
- entry_id: sliding-window-shortest-cpp
  language: cpp
  code: |
    int minWindowLength(int target, const std::vector<int>& nums) {
        int left = 0;
        int sum = 0;
        int best = static_cast<int>(nums.size()) + 1;

        for (int right = 0; right < static_cast<int>(nums.size()); right++) {
            sum += nums[right];

            while (sum >= target) {
                best = std::min(best, right - left + 1);
                sum -= nums[left];
                left++;
            }
        }

        return best == static_cast<int>(nums.size()) + 1 ? 0 : best;
    }

