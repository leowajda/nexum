- entry_id: sliding-window-shortest-java
  language: java
  code: |
    int minWindowLength(int target, int[] nums) {
        int best = Integer.MAX_VALUE;
        int sum = 0;

        for (int left = 0, right = 0; right < nums.length; right++) {
            sum += nums[right];

            while (sum >= target) {
                best = Math.min(best, right - left + 1);
                sum -= nums[left++];
            }
        }

        return best == Integer.MAX_VALUE ? 0 : best;
    }
