    int shortestPath(int[][] grid, int startRow, int startCol, int targetRow, int targetCol) {
        int rows = grid.length;
        int cols = grid[0].length;
        int[][] distance = new int[rows][cols];
        int[][] directions = {{1, 0}, {-1, 0}, {0, 1}, {0, -1}};

        for (int[] row : distance)
            Arrays.fill(row, -1);

        ArrayDeque<int[]> queue = new ArrayDeque<>();
        queue.addLast(new int[]{startRow, startCol});
        distance[startRow][startCol] = 0;

        while (!queue.isEmpty()) {
            int[] cell = queue.removeFirst();
            int row = cell[0];
            int col = cell[1];

            if (row == targetRow && col == targetCol)
                return distance[row][col];

            for (int[] direction : directions) {
                int nextRow = row + direction[0];
                int nextCol = col + direction[1];

                if (nextRow < 0 || nextRow >= rows || nextCol < 0 || nextCol >= cols)
                    continue;
                if (grid[nextRow][nextCol] == 1 || distance[nextRow][nextCol] != -1)
                    continue;

                distance[nextRow][nextCol] = distance[row][col] + 1;
                queue.addLast(new int[]{nextRow, nextCol});
            }
        }

        return -1;
    }
