    std::pair<int, int> twoSumSorted(const std::vector<int>& nums, int target) {
        int left = 0;
        int right = static_cast<int>(nums.size()) - 1;

        while (left < right) {
            int current = nums[left] + nums[right];

            if (current == target)
                return {left, right};
            if (current < target)
                left++;
            else
                right--;
        }

        return {-1, -1};
    }

