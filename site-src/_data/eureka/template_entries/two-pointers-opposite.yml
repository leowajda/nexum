    def twoSumSorted(nums: Array[Int], target: Int): (Int, Int) =
      var left = 0
      var right = nums.length - 1

      while left < right do
        val sum = nums(left) + nums(right)

        if sum == target then
          return (left, right)
        else if sum < target then
          left += 1
        else
          right -= 1

      (-1, -1)
