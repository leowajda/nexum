    def two_sum_sorted(nums: list[int], target: int) -> tuple[int, int]:
        left = 0
        right = len(nums) - 1

        while left < right:
            current = nums[left] + nums[right]

            if current == target:
                return left, right
            if current < target:
                left += 1
            else:
                right -= 1

        return -1, -1
