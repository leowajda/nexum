    int shortestHamiltonianPath(int[][] cost) {
        int n = cost.length;
        int[][] dp = new int[1 << n][n];
        for (int[] row : dp)
            Arrays.fill(row, 1_000_000_000);
        dp[1][0] = 0;

        for (int mask = 1; mask < (1 << n); mask++)
            for (int last = 0; last < n; last++)
                if ((mask & (1 << last)) != 0)
                    for (int next = 0; next < n; next++)
                        if ((mask & (1 << next)) == 0)
                            dp[mask | (1 << next)][next] = Math.min(dp[mask | (1 << next)][next], dp[mask][last] + cost[last][next]);

        return Arrays.stream(dp[(1 << n) - 1]).min().orElse(-1);
    }
