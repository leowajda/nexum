    def shortest_hamiltonian_path(cost):
        n = len(cost)
        dp = [[float("inf")] * n for _ in range(1 << n)]
        dp[1][0] = 0
        for mask in range(1 << n):
            for last in range(n):
                if mask & (1 << last):
                    for nxt in range(n):
                        if not mask & (1 << nxt):
                            dp[mask | (1 << nxt)][nxt] = min(dp[mask | (1 << nxt)][nxt], dp[mask][last] + cost[last][nxt])
        return min(dp[-1])

