- id: constant-memory-monotonic
  kind: decision
  label: Involves monotonic condition?
  title: Monotonic Condition
  references: []
  details_html: |-
    <p>Monotonicity simply means either entirely non-increasing or entirely non-decreasing.
    In the context of a two-pointer algorithm, the monotonic condition represents a constraint that the algorithm should follow.</p>
    <p>We just need to find some property that's entirely non-increasing or entirely non-decreasing. If there isn't any obvious property, we should
    also consider sorting to make the array monotonic and then checking for a way to implement two pointers into the solution.
    Note that sorting the array won't use extra space.</p>
  layout:
    column: decision
    row: 74
