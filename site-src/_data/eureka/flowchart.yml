  details_html: |-
    <p>The simplest and most common way to determine if a problem deals with trees is if the problem directly refers to a "tree", "root" or a
    "leaf".</p>
    <p>We should also take note of some properties of trees. If a problem mentions a graph (not explicitly a tree),
    we can identify some relation to trees of some properties of trees are mentioned. For example, the fact that trees
    have <code>n - 1</code> nodes if the number of nodes in that tree is <code>n</code> or the fact that they don't have cycles.</p>
  layout:
