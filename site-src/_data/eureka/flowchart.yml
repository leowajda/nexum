- id: parse-symbols
  kind: decision
  label: Do you need to parse symbols?
  title: Symbol Parsing Problems
  references:
  - title: Valid Parentheses
    url: https://leetcode.com/problems/valid-parentheses/
    difficulty: Easy
    frontend_id: '20'
  - title: Basic Calculator
    url: https://leetcode.com/problems/basic-calculator/
    difficulty: Hard
    frontend_id: '224'
  details_html: |-
    <p>Problems that involve parsing or evaluating expressions with symbols like parentheses, operators, or other special characters often require a stack-based approach. Look for these indicators:</p>
    <ul>
    <li>Need to match opening/closing symbols (like parentheses, brackets, braces)</li>
    <li>Need to evaluate mathematical expressions</li>
    <li>Need to validate syntax or expression correctness</li>
    <li>Need to process nested structures like an Abstract Syntax Tree</li>
    </ul>
  layout:
    column: main
    row: 77
- id: parse-symbols-stack
  kind: solution
  label: Stack
  title: Stack
  references:
  - title: Valid Parentheses
    url: https://leetcode.com/problems/valid-parentheses/
    difficulty: Easy
    frontend_id: '20'
  - title: Basic Calculator
    url: https://leetcode.com/problems/basic-calculator/
    difficulty: Hard
    frontend_id: '224'
  - title: Remove All Adjacent Duplicates In String
    url: https://leetcode.com/problems/remove-all-adjacent-duplicates-in-string/
    difficulty: Easy
    frontend_id: '1047'
  details_html: |-
    <p>A stack is a Last-In-First-Out (LIFO) data structure that's particularly useful for parsing because:</p>
    <ul>
    <li>It naturally handles nested structures by keeping track of the most recently seen symbols</li>
    <li>The LIFO property matches how nested expressions work - the most recently opened parenthesis must be closed first</li>
    <li>It can maintain state/context as you process symbols one by one</li>
    <li>It allows you to "backtrack" by popping elements when you need to resolve or close a nested structure</li>
    </ul>
    <p>For example, when parsing "(())", the stack operations would be:</p>
    <ol>
    <li>Push '(' - stack: ['(']</li>
    <li>Push '(' - stack: ['(', '(']</li>
    <li>Pop '(' and match with ')' - stack: ['(']</li>
    <li>Pop '(' and match with ')' - stack: []
    Empty stack at end means valid expression!</li>
    </ol>
  layout:
    column: decision
    row: 78
