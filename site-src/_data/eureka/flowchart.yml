  details_html: |-
    <p>The sliding window technique refers to maintaining a continuous segment, or "window," of elements, usually within an array or string.
    The window will represent a subarray, which makes this technique useful to solve problems related to subarrays/substrings.
    The sliding window can be of two types:</p>
    <ul>
    <li>Fixed-size sliding window
    <ul>
    <li>The window size remains constant throughout the process, and only the position of the window within the data structure shifts.</li>
    </ul>
    </li>
    <li>Variable-size sliding window
    <ul>
    <li>The window size expands or contracts based on the problem's constraints, along with its movement within the data structure.
    This is implemented with two pointers, with the pointers indicating the left/right borders of the window.</li>
    </ul>
    </li>
