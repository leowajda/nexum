    row: 1
- id: tree-dfs
  kind: solution
  label: DFS
  title: DFS
  references: []
  details_html: |-
    <p>When tackling tree problems, Depth First Search (DFS) often takes the spotlight due to its natural alignment
    with tree hierarchies, space efficiency, and ease of recursion. While Breadth First Search (BFS) shines in
    scenarios like finding the shortest path in unweighted trees or level-order traversals, DFS stands out for
    depth-related tasks, path-oriented challenges, and its adaptability to various traversal techniques.</p>
  layout:
    column: secondary
    row: 2
- id: directed-graph
  kind: decision
  label: Is problem related to directed acyclic graphs?
  title: Directed Acyclic Graphs
  references:
  - title: Course Schedule
    url: https://leetcode.com/problems/course-schedule/
    difficulty: Medium
    frontend_id: '207'
  - title: Network Delay Time
    url: https://leetcode.com/problems/network-delay-time/
    difficulty: Medium
    frontend_id: '743'
  - title: All Ancestors of a Node in a Directed Acyclic Graph
    url: https://leetcode.com/problems/all-ancestors-of-a-node-in-a-directed-acyclic-graph/
    difficulty: Medium
    frontend_id: '2192'
  details_html: |-
    <p>When diving into graph problems, one of the first decisions you have to make is determining
    the type of graph you're dealing with. Among the many distinctions, one of the most fundamental is whether the
    graph is directed or undirected.</p>
    <p>How can you determine if a problem is centered around directed graphs?</p>
    <ul>
    <li>
    <p><strong>Explicit Mentions:</strong> Start by skimming the problem statement. If words like "directed" or "one-way" are present,
    they're clear indicators of a directed graph.</p>
    </li>
    <li>
    <p><strong>Edge Descriptions:</strong> Problems might describe scenarios where one node "points to" or "leads to" another.
    This directional language is a classic hallmark of directed graphs.</p>
    </li>
    <li>
    <p><strong>No Mutuality in Relationships:</strong> If the relationships between nodes aren't mutual – for instance, if Node <code>A</code> is
    related to Node <code>B</code>, but Node <code>B</code> isn't necessarily related to Node <code>A</code> – you're likely dealing with directed edges.</p>
    </li>
    </ul>
    <h2>Recognizing Acyclic Graphs in Problems</h2>
    <p>When approaching graph problems, the structure and nature of the graph play pivotal roles. The concept of acyclicity,
    where a graph doesn't have any cycles, is a key structural property. Here's how you can determine if a problem
    is hinging on the acyclic nature of a graph:</p>
    <ul>
    <li><strong>Explicit Mentions:</strong> Some problems may straightforwardly state terms like "Directed Acyclic Graph" or "DAG".
    This is a direct indicator of the acyclic nature.</li>
    <li><strong>Dependency Chains:</strong> If the problem revolves around a hierarchy or ordering of tasks, where tasks have prerequisites
    and you cannot have cyclic dependencies, it's hinting at acyclicity. Phrases like "before", "after", or "must be
    completed prior to" are cues.</li>
    <li><strong>Cycle Detection:</strong> If the problem is explicitly about detecting cycles, determining the presence or absence
    of cycles, or ensuring no cyclic dependencies, then it's inherently related to acyclicity.</li>
    </ul>
  layout:
    column: decision
    row: 5
- id: directed-graph-topo
  kind: solution
  label: Topological Sort
  title: Topological Sort
  references: []
  details_html: |-
    <p>Topological sort is a crucial algorithm for directed acyclic graphs, often abbreviated as DAGs. By definition,
    a DAG is a graph characterized by its directed edges and absence of cycles, ensuring that no sequence of edges
    loops back to a repeating vertex.</p>
    <p>A topological sort offers a linear ordering of the vertices so that if there's a directed edge from vertex <code>U</code> to
    vertex <code>V</code>, <code>U</code> always precedes <code>V</code> in the order. This ensures that all "prerequisites" come before the
    dependent node.</p>
  layout:
    column: secondary
    row: 6
- id: shortest-path
  kind: decision
  label: Is the problem related to shortest paths?
  title: Identifying Shortest Path Problems
  references:
  - title: Network Delay Time
    url: https://leetcode.com/problems/network-delay-time/
    difficulty: Medium
    frontend_id: '743'
  - title: Shortest Path in Binary Matrix
    url: https://leetcode.com/problems/shortest-path-in-binary-matrix/
    difficulty: Medium
    frontend_id: '1091'
  - title: Cheapest Flights Within K Stops
    url: https://leetcode.com/problems/cheapest-flights-within-k-stops/
    difficulty: Medium
    frontend_id: '787'
  details_html: |-
    <p>In graph-related questions, determining the shortest or most optimal path between nodes is a common theme.
    However, not every problem explicitly states, "find the shortest path". Often, cues embedded in the problem's
    phrasing signal a need for a shortest path solution.</p>
    <p>Here are telltale signs:</p>
    <ul>
    <li><strong>Distance or Minimum Steps:</strong> Problems might inquire about the least number of steps, transformations, or moves
    to attain a specific objective.</li>
    <li><strong>Seeking Optimal Solutions:</strong> Some problems revolve around finding the fastest, least costly, or most efficient
    method to achieve an outcome within the graph's structure.</li>
    <li><strong>Constrained Traversals:</strong> Occasionally, the traversal of a graph demands set conditions, such as
    avoiding obstacles or using specific paths a limited number of times.</li>
    </ul>
  layout:
    column: decision
    row: 9
- id: shortest-path-weighted
  kind: decision
  label: Is the graph Weighted?
  title: Weighted Graphs
  references:
  - title: Network Delay Time
    url: https://leetcode.com/problems/network-delay-time/
    difficulty: Medium
    frontend_id: '743'
  - title: Path with Maximum Probability
    url: https://leetcode.com/problems/path-with-maximum-probability/
    difficulty: Medium
    frontend_id: '1514'
  - title: Minimum Cost to Reach Destination in Time
    url: https://leetcode.com/problems/minimum-cost-to-reach-destination-in-time/
    difficulty: Hard
    frontend_id: '1928'
  details_html: |-
    <p>One of the prevalent categories within graph theory is the shortest path problem. The next pivotal decision is
    identifying whether the graph is weighted or not. This distinction profoundly influences the problem-solving approach.</p>
    <p>The most immediate clue is when the problem provides a distinct weight, cost, or distance
    for each edge or when the problem directly states the graph is weighted. An unweighted graph will have all edge weights
    be the same, usually <code>1</code>. If the edge weights can vary based on problem constraints, the graph is most likely weighted.</p>
  layout:
    column: secondary
    row: 10
- id: shortest-path-dijkstra
  kind: solution
  label: Dijkstra's Algorithm
  title: Dijkstra's Algorithm
  references: []
  details_html: |-
    <p>Navigating the complex realm of graph theory, we often encounter the challenge of finding the shortest path in a weighted graph.
    In this scenario, it's crucial to consider Dijkstra's Algorithm - a powerful tool tailored for this precise problem.</p>
    <p>Dijkstra's Algorithm operates as follows: starting from a selected vertex, it determines the shortest path
    to all other vertices. If no path is available, it acknowledges the absence.</p>
  layout:
    column: tertiary
    row: 11
- id: shortest-path-bfs
  kind: decision
  label: Is the state a grid?
  title: Grid or Graph BFS
  search_title: Unweighted shortest paths
  references: []
  details_html: |-
    <p>When dealing with shortest path problems in unweighted graphs, where all edges have the same weight, Breadth-First Search (BFS)
    stands out as it ensures an efficient and reliable means of pinpointing the shortest path.</p>
    <p>BFS operates as follows: starting from a designated vertex, it determines the shortest path to all other vertices,
    also marking any vertex as unreachable if no path exists to it.</p>
  layout:
    column: tertiary
    row: 13
