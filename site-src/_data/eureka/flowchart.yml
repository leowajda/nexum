- id: connectivity
  kind: decision
  label: Does the problem involve connectivity
  title: Connectivity Problems
  references:
  - title: Accounts Merge
    url: https://leetcode.com/problems/accounts-merge/
    difficulty: Medium
    frontend_id: '721'
  - title: Redundant Connection
    url: https://leetcode.com/problems/redundant-connection/
    difficulty: Medium
    frontend_id: '684'
  - title: Number of Operations to Make Network Connected
    url: https://leetcode.com/problems/number-of-operations-to-make-network-connected/
    difficulty: Medium
    frontend_id: '1319'
  details_html: |-
    <p>Connectivity in graph problems refers to scenarios where the relatedness of nodes plays a central role.
    Recognizing when a graph challenge is rooted in "connectivity" can guide you towards the most effective solution.
    So, how do you discern these types of problems?</p>
    <p>Watch for these indicative signs:</p>
    <ul>
    <li><strong>Distinctive Terminology:</strong> Terms such as "connected", "component", "island", and "group" often signal that a
    problem's focus is on connectivity.</li>
    <li><strong>Uniting or Merging</strong>: Problems discussing connecting or merging nodes, like linking towns through
    roads, usually center on connectivity.</li>
    <li><strong>Traversal Queries:</strong> Queries about traversing a structure from one point to all others, without retracing
    steps, also point towards connectivity.</li>
    </ul>
  layout:
    column: decision
    row: 13
- id: connectivity-dsu
  kind: solution
  label: Disjoint Set Union
  title: Disjoint Set Union
  references: []
  details_html: |-
    <p>Known alternatively as Union-Find, Disjoint Set Union (DSU) stands as a specialized data structure, purpose-built
    for efficiently addressing connectivity queries within an undirected graph. When navigating connectivity problems,
    DSU often emerges as a top choice due to its ability in dynamically categorizing elements into separate sets
    and its ability to efficiently verify if two elements coexist within the same set.</p>
    <p>DSU operations:</p>
    <ul>
    <li>Union Operation:  Merges two distinct sets into one cohesive unit. When two nodes are from different sets,
    the Union operation integrates them, rendering them members of an identical group.</li>
    <li>Find Operation: Pinpoints the specific set to which an element is affiliated. This task is achieved
    by following a path up to the set's "representative" or "leader."</li>
    </ul>
    <p>While traditional methods like BFS and DFS can also cater to connectivity inquiries, DSU rises above with
    its heightened efficiency. DSU offers more efficient connectivity queries and can handle dynamic
    scenarios where edges are added in the graph.</p>
  layout:
    column: secondary
    row: 14
- id: graph-smallcontraints
  kind: decision
  label: Does the problem have small constraints?
  title: Identifying Brute Force DFS and Backtracking
  references:
  - title: Word Search
    url: https://leetcode.com/problems/word-search/
    difficulty: Medium
    frontend_id: '79'
  - title: All Paths From Source to Target
    url: https://leetcode.com/problems/all-paths-from-source-to-target/
    difficulty: Medium
    frontend_id: '797'
  - title: Couples Holding Hands
    url: https://leetcode.com/problems/couples-holding-hands/
    difficulty: Hard
    frontend_id: '765'
  details_html: |-
    <p>Brute force solutions, particularly in graph problems, involve comprehensively exploring all paths or configurations
    to derive a solution. This strategy is essentially an unrefined exploration, and in some scenarios, particularly
    with small constraints, it becomes the go-to approach.</p>
    <p>When diving into graph problems, how can you pinpoint when a brute force method is required?</p>
    <p>Look out for these key indicators:</p>
    <ol>
    <li>
    <p><strong>Vast Search Space with No Direct Optimizations</strong></p>
    <p>If the problem sets up an expansive search space and doesn't offer clear-cut optimizations, consider
    brute force as an opening strategy.</p>
    </li>
    <li>
    <p><strong>Asks for All Possible Solutions</strong></p>
    <p>When the problem statement uses terms like "find all possible paths" or "determine all configurations,"
    it's often hinting towards an exhaustive, brute force approach as a foundation.</p>
    </li>
    <li>
    <p><strong>Small Graph Constraints</strong>:
    If the graph's constraints are limited — for instance, if there are up to 10^2 nodes — a brute force method is
    likely workable within computational time limits.</p>
    </li>
    </ol>
    <p>Brute force in graph problems often entails trying every possible path or configuration to obtain a solution.
    It's a naive way of exploring all possibilities without employing any optimizations. A typical brute force
    strategy on graphs might involve running a DFS or BFS from every node or for every possible combination of nodes.</p>
  layout:
    column: decision
    row: 17
- id: graph-smallcontraints-dfs
  kind: solution
  label: Graph DFS
  title: Graph DFS
  references: []
  details_html: |-
    <p>In graph problems with small constraints, Depth-First Search (DFS) and backtracking shine as invaluable techniques.
    They excel by exhaustively diving into each potential solution path until reaching a resolution or a dead-end.
    DFS systematically begins from a source node, delving deep along each branch and only backtracks when necessary.
    This depth-driven approach is especially suited for problems where traversing numerous paths within a graph
    is essential.</p>
  layout:
    column: secondary
    row: 18
- id: graph-smallcontraints-bfs
  kind: decision
  label: Is the state a grid?
  title: Grid or Graph BFS
  search_title: Small constraints
  references: []
  details_html: |-
    <p>In general graph theory problems, both Breadth First Search (BFS) and Depth First Search (DFS) are fundamental
    algorithms. BFS is especially favored for detecting shortest paths and assessing connectivity, whereas DFS excels
    in other areas but doesn't always provide the shortest path. When confronting unconventional graph problems,
    considering the application of BFS or DFS often illuminates a path to a solution. Despite their simplicity,
    these algorithms address a vast array of graph-related challenges.</p>
  layout:
    column: secondary
    row: 20
- id: graph-smallcontraints-graph-bfs
  kind: solution
  label: Graph BFS
  title: Graph BFS
  references: []
  details_html: "<p>Use BFS for small unweighted graph or state-space exploration
    when level order matters.</p>"
  layout:
    column: secondary-branch
    row: 19.5
- id: graph-smallcontraints-grid-bfs
  kind: solution
  label: Grid BFS
  title: Grid BFS
  references: []
  details_html: "<p>Use BFS when the states are grid cells and each move has the same
    cost.</p>"
  layout:
    column: secondary-branch
    row: 21
